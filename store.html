<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Title page -->
    <title>Bahri Store</title>

    <!-- linking css -->
    <link rel="stylesheet" href="store.css" />
  </head>

  <body>
    <!--
         HEADER : navbar -->
    <header>
      <nav class="navbar">
        <!-- Logo of store -->
        <h1 class="logo">Bahri Store</h1>

        <!-- Menu de navigation -->
        <ul class="nav-links">
          <!-- Chaque <li> représente un lien du menu -->
          <li><a href="#home">Home</a></li>
          <li><a href="#products">Products</a></li>
          <li><a href="#about">About</a></li>
          <li><a href="#contact">Contact</a></li>
        </ul>
      </nav>
    </header>

    <!-- ===================================================
         HERO SECTION : image in background + text in the middle
    ==================================================== -->
    <section class="hero" id="home">
      <!-- Contenu au centre de l'image -->
      <div class="hero-content">
        <h2>Welcome to Bahri Store</h2>
        <p>Discover our latest collection</p>

        <!-- Bouton simple -->
        <button>Shop Now</button>
      </div>
    </section>

    <!-- ===================================================
         PRODUCTS SECTION: cards displaying the products
    ==================================================== -->
    <section class="products" id="products">
      <!-- Section Title -->
      <h2 class="section-title">Our Products</h2>

      <!-- Grid containing all product cards -->
      <div class="product-grid">
        <!-- ======================
                 product 1
            ======================= -->
        <div class="product-card">
          <!-- Image of product -->
          <img
            src="https://preview.colorlib.com/theme/cozastore/images/product-02.jpg"
            alt="Product 1"
          />

          <!-- name of product -->
          <h3>Esprit Ruffle Shirt</h3>

          <!-- Description -->
          <p>$16.64</p>

          <!-- Boutton  -->
          <button>Shop Now</button>
        </div>

        <!-- product 2 -->
        <div class="product-card">
          <img
            src="https://preview.colorlib.com/theme/cozastore/images/product-01.jpg"
            alt="Product 2"
          />
          <h3>Herschel supply</h3>
          <p>$35.31</p>
          <button>Shop Now</button>
        </div>

        <!-- product 3 -->
        <div class="product-card">
          <img
            src="https://preview.colorlib.com/theme/cozastore/images/product-03.jpg"
            alt="Product 3"
          />
          <h3>Only Check Trouser</h3>
          <p>$25.50</p>
          <button>Shop Now</button>
        </div>

        <!-- product 4 -->
        <div class="product-card">
          <img
            src="https://preview.colorlib.com/theme/cozastore/images/product-04.jpg"
            alt="Product 4"
          />
          <h3>Classic Trench Coat</h3>
          <p>$75.00</p>
          <button>Shop Now</button>
        </div>
      </div>
    </section>

    <!-- ===================================================
         FOOTER 
    ==================================================== -->
    <footer>
      <p>© 2025 Bahri Store — All Rights Reserved</p>
    </footer>
  </body>
</html>
